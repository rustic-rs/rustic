# SFTP repository example. Use SSH key authentication or provide credentials
# through the environment.

[repository]
repository = "opendal:sftp"

[repository.options]
endpoint = "backup.example.com:22"
user = "backup"
root = "/srv/rustic"

[backup]
git-ignore = true
exclude-if-present = [".nobackup", "CACHEDIR.TAG"]

[[backup.snapshots]]
sources = ["/home"]

[forget]
keep-daily = 7
keep-weekly = 4
keep-monthly = 12
keep-yearly = 5
